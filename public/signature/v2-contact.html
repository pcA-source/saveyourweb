<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Signature V2 — Contact corporate</title></head>
<body style="margin:0;padding:20px;background:#f5f5f5;">

<!-- V2 CONTACT — Corporate with logo + CTA banner -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;max-width:480px;">
  <tr>
    <td>
      <!-- Logo + tagline -->
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding-bottom:4px;">
            <img src="https://saveyourweb.pages.dev/signature/logo-syw.png" 
                 alt="Save Your Web" 
                 width="170" 
                 style="display:block;" />
          </td>
        </tr>
        <tr>
          <td style="padding-bottom:12px;">
            <span style="font-size:12px;color:#888;letter-spacing:0.02em;">Agence SEO & SEA — Référencement naturel et payant</span>
          </td>
        </tr>
      </table>
      <!-- Divider -->
      <table cellpadding="0" cellspacing="0" border="0" width="100%"><tr>
        <td style="border-top:2px solid #ff6a00;padding-top:12px;">
          <table cellpadding="0" cellspacing="0" border="0">
            <tr>
              <td style="padding-bottom:3px;">
                <span style="font-size:12.5px;color:#555;">
                  ✉️&nbsp;&nbsp;<a href="mailto:contact@saveyourweb.fr" style="color:#1a1a1a;text-decoration:none;">contact@saveyourweb.fr</a>
                </span>
              </td>
            </tr>
            <tr>
              <td style="padding-bottom:12px;">
                <span style="font-size:12.5px;">
                  🌐&nbsp;&nbsp;<a href="https://saveyourweb.fr" style="color:#ff6a00;text-decoration:none;font-weight:600;">saveyourweb.fr</a>
                </span>
              </td>
            </tr>
          </table>
        </td>
      </tr></table>
      <!-- CTA Banner -->
      <table cellpadding="0" cellspacing="0" border="0" width="100%"><tr>
        <td style="background:#1a1a1a;border-radius:6px;padding:12px 18px;">
          <table cellpadding="0" cellspacing="0" border="0" width="100%"><tr>
            <td style="vertical-align:middle;">
              <span style="font-size:12.5px;color:#f2f2f2;">Votre site mérite la 1ère page</span>
            </td>
            <td style="vertical-align:middle;text-align:right;">
              <a href="https://saveyourweb.fr#contact" style="font-size:11.5px;color:#ff6a00;text-decoration:none;font-weight:700;">Audit gratuit →</a>
            </td>
          </tr></table>
        </td>
      </tr></table>
    </td>
  </tr>
</table>

</body>
</html>
