<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1080px;
    height: 1080px;
    background: #0A0A0A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle gradient accent */
  .bg-accent {
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,106,0,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .bg-accent-bottom {
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,106,0,0.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 70px 90px;
    width: 100%;
    height: 100%;
    justify-content: space-between;
  }

  .top-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .badge {
    display: inline-block;
    background: rgba(255,106,0,0.12);
    border: 1px solid rgba(255,106,0,0.3);
    color: #FF6A00;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 32px;
    border-radius: 50px;
  }

  .main-number {
    font-size: 160px;
    font-weight: 800;
    color: #FF6A00;
    line-height: 1;
    letter-spacing: -5px;
  }

  .main-title {
    font-size: 58px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.2;
    letter-spacing: -1px;
  }

  .main-title span {
    color: #FF6A00;
  }

  .subtitle {
    font-size: 28px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    line-height: 1.5;
    max-width: 750px;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: #FF6A00;
    border-radius: 2px;
  }

  .middle-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .bottom-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .cta {
    display: inline-block;
    background: #FF6A00;
    color: #FFFFFF;
    font-size: 22px;
    font-weight: 700;
    padding: 18px 48px;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }

  .brand {
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
  }

  .brand .dot {
    color: #FF6A00;
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="bg-accent"></div>
  <div class="bg-accent-bottom"></div>
  
  <div class="container">
    <div class="top-section">
      <div class="badge">Guide gratuit — 25 pages</div>
    </div>

    <div class="middle-section">
      <div class="main-number">10</div>
      <div class="main-title">erreurs SEO<br>qui <span>tuent</span> votre trafic</div>
      <div class="divider"></div>
      <div class="subtitle">Et comment les corriger concrètement</div>
    </div>

    <div class="bottom-section">
      <div class="cta">Télécharger gratuitement</div>
      <div class="brand">Save Your Web<span class="dot">.</span></div>
    </div>
  </div>
</body>
</html>
